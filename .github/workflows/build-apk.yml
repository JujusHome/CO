name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Init Bubblewrap project
        run: |
          bubblewrap init \
            --manifest https://jujushome.github.io/CO/manifest.json \
            --directory twa-project
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

      - name: Build APK
        working-directory: twa-project
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chrono-co-apk
          path: twa-project/app-release-unsigned.apk
          retention-days: 30
