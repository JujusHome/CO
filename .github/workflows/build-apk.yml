name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Download launcher icon
        run: |
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          curl -L https://jujushome.github.io/CO/icon-192.png \
            -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Build APK
        run: gradle assembleRelease -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true
     
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chrono-co-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
